  <g transform="translate(192 14) rotate(-6 12 40)">
    <path d="M 12 0 C 12 0, -6 30, -6 48 A 18 18 0 0 0 30 48 C 30 30, 12 0, 12 0 Z"
          fill="url(#de-drop)" stroke="#c2410c"
          stroke-width="1.5" stroke-linejoin="round"/>
    <ellipse cx="4" cy="42" rx="4" ry="7" fill="rgba(255,255,255,0.45)"/>
  </g>
