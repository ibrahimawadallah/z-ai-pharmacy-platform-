<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" role="img" aria-label="DrugEye">
  <title>DrugEye</title>
  <defs>
    <linearGradient id="de-pill-top" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="de-pill-bot" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#99f6e4"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <linearGradient id="de-drop" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#fdba74"/>
      <stop offset="55%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
  </defs>

  <path d="M 20 80 C 50 20, 190 20, 220 80 C 190 140, 50 140, 20 80 Z"
