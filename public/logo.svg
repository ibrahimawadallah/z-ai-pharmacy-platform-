        stroke-linejoin="round"/>
  <path d="M 102 80 L 138 80 L 138 110 A 18 18 0 0 1 102 110 Z"
        fill="url(#de-pill-bot)" stroke="#115e59" stroke-width="2.5"
        stroke-linejoin="round"/>
  <line x1="101" y1="80" x2="139" y2="80" stroke="#115e59"
        stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 108 55 Q 114 48 122 50" stroke="rgba(255,255,255,0.55)"
